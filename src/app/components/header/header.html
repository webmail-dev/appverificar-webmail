          <div class="px-lg-4 px-2 ps-0 d-flex align-items-center" *ngIf="showInstallButton">




                <a href="javascript:void(0);" class="btn btn-icon btn-white btn-xl" data-bs-toggle="tooltip" data-bs-placement="top" data-bs-title="fi fi-rr-download"  (click)="installPwa()">
                <i class="fi fi-rr-download"></i>
              </a>
          </div>
          <div class="vr my-3"></div>
          <div class="vr my-3"></div>
          <div class="dropdown text-end ms-sm-3 ms-2 ms-lg-4" style="cursor: pointer;">
            <a class="d-flex align-items-center py-2" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="true">
              <div class="text-end me-2 d-none d-lg-inline-block">
                <div class="fw-bold text-dark">David</div>
                <small class="text-body d-block lh-sm">
                  <i class="fi fi-rr-angle-down text-3xs me-1"></i> Administrador
                </small>
              </div>
              <div class="avatar avatar-sm rounded-circle avatar-status-success">
                <img src="assets/images/avatar/avatar2.webp" alt="">
              </div>
            </a>
            <ul class="dropdown-menu dropdown-menu-end w-225px mt-1">
              <li class="d-flex align-items-center p-2">
                <div class="avatar avatar-sm rounded-circle">
                  <img src="assets/images/avatar/avatar2.webp" alt="">
                </div>
                <div class="ms-2">
                  <div class="fw-bold text-dark">David </div>
                  <small class="text-body d-block lh-sm">verificarit@gmail.com</small>
                </div>
              </li>
              <li>
                <div class="dropdown-divider my-1"></div>
              </li>

              <li>
                <a class="dropdown-item d-flex align-items-center gap-2 text-danger" href="#" (click)="$event.preventDefault(); logout($event)">
                  <i class="fi fi-sr-exit scale-1x"></i> Salir
                </a>
              </li>
            </ul>
          </div>
